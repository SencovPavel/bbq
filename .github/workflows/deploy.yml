name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    name: Deploy → ${{ github.ref_name }}
    runs-on: self-hosted

    steps:
      - name: Deploy frontend
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e

          if [ "$BRANCH" = "main" ]; then
            DEPLOY_DIR="/var/www/picnic/fe-main"
          else
            DEPLOY_DIR="/var/www/picnic/fe-dev"
          fi

          echo "▶ Deploying '$BRANCH' → $DEPLOY_DIR"

          cd "$DEPLOY_DIR"
          git fetch origin
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"
          npm ci --prefer-offline
          npm run build

          echo "✅ Done: $BRANCH → $DEPLOY_DIR/dist"
