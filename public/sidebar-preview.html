<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Summary hero variants 2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
body { background: #100e0b; color: #f5f0ea; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 20px; min-height: 100vh; align-items: start; }
h2 { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: rgba(245,240,234,.3); padding: 0 2px 10px; }

/* ── Г: Три метрики в ряд ── */
.g-wrap {
  border-radius: 20px; padding: 20px;
  background: linear-gradient(135deg, rgba(249,115,22,.18), rgba(251,191,36,.08));
  border: 1px solid rgba(249,115,22,.25);
}
.g-bar { height: 6px; border-radius: 99px; background: rgba(255,255,255,.12); overflow: hidden; margin-bottom: 18px; }
.g-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #f97316, #4ade80); width: 71%; }
.g-row { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; gap: 0; }
.g-sep { background: rgba(255,255,255,.08); }
.g-cell { padding: 0 14px; }
.g-cell:first-child { padding-left: 0; }
.g-cell:last-child { padding-right: 0; }
.g-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; opacity: .5; margin-bottom: 5px; }
.g-num { font-size: 20px; font-weight: 900; letter-spacing: -.02em; }
.g-sub { font-size: 10px; opacity: .45; margin-top: 2px; }

/* ── Д: Минимализм — только цифры ── */
.d-wrap {
  border-radius: 20px; padding: 24px 22px;
  background: rgba(255,240,200,.04);
  border: 1px solid rgba(255,220,150,.1);
}
.d-eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #f97316; margin-bottom: 10px; opacity: .8; }
.d-hero { font-size: 48px; font-weight: 900; letter-spacing: -.04em; line-height: 1; margin-bottom: 6px; }
.d-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.d-bar { flex: 1; height: 3px; border-radius: 99px; background: rgba(255,255,255,.1); overflow: hidden; }
.d-fill { height: 100%; border-radius: 99px; background: #f97316; width: 71%; }
.d-pct { font-size: 11px; font-weight: 700; color: #f97316; }
.d-footer { display: flex; justify-content: space-between; align-items: center; }
.d-per { font-size: 13px; font-weight: 700; opacity: .55; }
.d-per b { font-size: 18px; font-weight: 900; opacity: 1; color: #f5f0ea; }

/* ── Е: Кольцо прогресса ── */
.e-wrap {
  border-radius: 20px; padding: 22px;
  background: linear-gradient(135deg, rgba(249,115,22,.18), rgba(251,191,36,.08));
  border: 1px solid rgba(249,115,22,.25);
  display: flex; align-items: center; gap: 20px;
}
.e-ring { flex-shrink: 0; position: relative; width: 80px; height: 80px; }
.e-ring svg { transform: rotate(-90deg); }
.e-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.e-ring-pct { font-size: 16px; font-weight: 900; color: #4ade80; }
.e-ring-sub { font-size: 8px; font-weight: 700; opacity: .5; text-transform: uppercase; letter-spacing: .05em; }
.e-info { flex: 1; min-width: 0; }
.e-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; opacity: .5; margin-bottom: 6px; }
.e-num { font-size: 30px; font-weight: 900; letter-spacing: -.02em; margin-bottom: 2px; }
.e-count { font-size: 11px; opacity: .55; margin-bottom: 12px; }
.e-sep { height: 1px; background: rgba(255,255,255,.08); margin-bottom: 10px; }
.e-per { display: flex; justify-content: space-between; align-items: center; }
.e-per-label { font-size: 10px; opacity: .5; }
.e-per-num { font-size: 14px; font-weight: 800; }
</style>
</head>
<body>

<!-- Г: Три метрики в ряд -->
<div>
  <h2>Г — Три метрики в ряд</h2>
  <div class="g-wrap">
    <div class="g-bar"><div class="g-fill"></div></div>
    <div class="g-row">
      <div class="g-cell">
        <div class="g-label">Куплено</div>
        <div class="g-num">1 850 ₽</div>
        <div class="g-sub">71% из плана</div>
      </div>
      <div class="g-sep"></div>
      <div class="g-cell">
        <div class="g-label">На чел.</div>
        <div class="g-num">370 ₽</div>
        <div class="g-sub">5 человек</div>
      </div>
      <div class="g-sep"></div>
      <div class="g-cell">
        <div class="g-label">Позиций</div>
        <div class="g-num">5 / 7</div>
        <div class="g-sub">2 без цены</div>
      </div>
    </div>
  </div>
</div>

<!-- Д: Минимализм -->
<div>
  <h2>Д — Минимализм</h2>
  <div class="d-wrap">
    <div class="d-eyebrow">Куплено · 5 из 7</div>
    <div class="d-hero">1 850 ₽</div>
    <div class="d-bar-row">
      <div class="d-bar"><div class="d-fill"></div></div>
      <div class="d-pct">71%</div>
    </div>
    <div class="d-footer">
      <div class="d-per">На человека — <b>370 ₽</b></div>
      <div style="font-size:11px;opacity:.4">5 чел.</div>
    </div>
  </div>
</div>

<!-- Е: Кольцо прогресса -->
<div>
  <h2>Е — Кольцо прогресса</h2>
  <div class="e-wrap">
    <div class="e-ring">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="7"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke="url(#g)" stroke-width="7"
          stroke-dasharray="213.6" stroke-dashoffset="61.9" stroke-linecap="round"/>
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#4ade80"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="e-ring-label">
        <div class="e-ring-pct">71%</div>
        <div class="e-ring-sub">куплено</div>
      </div>
    </div>
    <div class="e-info">
      <div class="e-label">Итого потрачено</div>
      <div class="e-num">1 850 ₽</div>
      <div class="e-count">5 из 7 позиций</div>
      <div class="e-sep"></div>
      <div class="e-per">
        <div class="e-per-label">На человека (5)</div>
        <div class="e-per-num">370 ₽</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
